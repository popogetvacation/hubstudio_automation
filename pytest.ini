[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    api: API 相关测试
    database: 数据库相关测试
    connection: 连通性测试
    parsing: 数据解析测试
    write: 写入操作测试
    duplicate: 重复主键测试

# 忽略路径
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# 日志
log_cli = false
log_cli_level = INFO