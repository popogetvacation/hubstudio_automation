# HubStudio 自动化配置文件

hubstudio:
  # API 基础地址 (本地客户端)
  api_url: "http://127.0.0.1:6873"
  # API Key (从 HubStudio 客户端获取)
  api_key: ""
  # 请求超时时间(秒)
  timeout: 30

database:
  # Access 数据库路径
  access_path: "./data/automation.accdb"
  # 数据库连接池大小
  pool_size: 5

scheduler:
  # 最大并发环境数
  max_concurrent: 10
  # 单个任务超时时间(秒)
  task_timeout: 300
  # 环境启动超时(秒)
  env_startup_timeout: 60
  # 重试次数
  max_retries: 3
  # 重试间隔(秒)
  retry_interval: 5

browser:
  # ChromeDriver 路径
  chromedriver_path: "D:\\Program Files (x86)\\chromedriver.exe"
  # 浏览器启动参数
  page_load_timeout: 30
  script_timeout: 30
  implicit_wait: 10

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/automation.log"
